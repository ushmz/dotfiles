# Set prefix key
unbind C-b
set -g prefix C-t

set -g default-shell "${TMUX_SHELL}"

set -s escape-time 0
set -g base-index 1
set -g mouse on
set -g focus-events on
# Allow passthrough for image rendering protocols
set -gq allow-passthrough on
set -g visual-activity off

# Clipboard
set -s set-clipboard on
set -s copy-command 'pbcopy'

# True color
set -g default-terminal "tmux-256color"
set -sa terminal-features ',*:RGB'

# Pane borders
set -g pane-border-status top
set -g pane-border-format "#{pane_current_command}"
set -g allow-rename off # Disable renaming via terminal escape sequences from the server
# set -g automatic-rename off # Disable tmux's own automatic renaming

# Workaround for cursor disappearing after coming back from another shell
set -ga terminal-overrides '*:cnorm=\E[?12l\E[?25h'

# Status line
set -g status-position bottom
set -g status-left-length 150
set -g status-right-length 120
set -g status-interval 1
set -g status-justify centre
set -g status-bg "color236"
set -g status-fg "color234"
set -g status-left '#[fg=color253,bg=color239] #S at #H : [#P] #[fg=color239,bg=color236]'
set -g status-right '#[fg=color242,bold]#[bg=color107,bold]#(sh -c "${XDG_CONFIG_HOME}/tmux/battery")#[fg=color239,bg=color236]#[bg=color239,fg=color253,bold] %Y-%m-%d(%a)%H:%M '

setw -g window-style 'bg=terminal'
setw -g window-active-style 'bg=terminal'
setw -g window-status-style dim
setw -g window-status-current-style bold,bright

setw -g window-status-format '#[fg=color66]  #I:#{?window_bell_flag, 󰂚,} #W'
setw -g window-status-current-format '#[fg=color109]  #I:#{?window_bell_flag, 󰂚,} #W'
# Uncomment below for a monochrome style
# setw -g window-status-format '#[fg=color253]  #I:#{?window_bell_flag, 󰂚,} #W'
# setw -g window-status-current-format '#[fg=color253]  #I:#{?window_bell_flag, 󰂚,} #W'

# Key bindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind t split-window -h
bind y split-window -v
bind space copy-mode

unbind n; bind n new-window
unbind [; bind [ previous-window
unbind ]; bind ] next-window
unbind d; bind d popup -w95% -h95% -d '#{pane_current_path}' -E lazydocker
unbind g; bind g popup -w95% -h95% -d '#{pane_current_path}' -E tig

unbind p
unbind c

bind r source-file ${XDG_CONFIG_HOME}/tmux/tmux.conf \; display-message "Config reloaded!!"
bind o run-shell "open #{pane_current_path}"
bind q confirm-before -p "Respawn pane? (y/others)" "respawn-pane -k -c '#{pane_current_path}'"
bind i split-window -c "#{pane_current_path}" \
  "$SHELL --login -i -c 'navi --print | tmux load-buffer -b tmp - ; tmux paste-buffer -p -t {last} -b tmp -d'"

# vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y send -X select-line \; send -X copy-pipe-and-cancel "pbcopy"
bind C-p paste-buffer


